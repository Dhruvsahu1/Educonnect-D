apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: educonnect-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    # Rewrite /api requests to backend without /api prefix
    # The backend expects routes like /auth/login, /posts, etc.
    # But frontend calls /api/auth, /api/posts, etc.
    # So we keep /api prefix and forward to backend
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # API routes - all /api/* requests go to backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 5000
      # Health check endpoint
      - path: /health
        pathType: Exact
        backend:
          service:
            name: backend
            port:
              number: 5000
      # Frontend - everything else goes to frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
---
