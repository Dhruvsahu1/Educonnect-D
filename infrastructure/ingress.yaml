apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: educonnect-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"           # Use GCE ingress controller
    kubernetes.io/ingress.allow-http: "true"     # Enable HTTP
spec:
  rules:
    - http:
        paths:
          # Backend (API) path
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # Frontend path
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
