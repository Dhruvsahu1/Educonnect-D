name: ZAP Security Scan (Container)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t  docker.io/hardik0811/educonnect-backend:latest ./backend

      - name: Run app container
        run: |
         docker run -d -p 5000:5000 docker.io/hardik0811/educonnect-backend:latest .  
          echo "Waiting for app to start..."
          for i in {1..10}; do
            curl -s http://localhost:5000 && break
            sleep 3
          done

      - name: Run ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.8.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          cmd_options: '-a'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
