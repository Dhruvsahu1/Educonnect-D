name: Supply Chain Guardian
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Nightly CVE check

permissions:
  contents: write
  pull-requests: write

jobs:
  guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Supply Chain Guardian AI
        uses: barbaria888/SupplyChain-Guardian-AI-Github_Action@v2
        with:
          # 1. Changed 'dockerfile-path' to 'dockerfile' 
          # 2. Pointed directly to your backend directory path
          dockerfile: "./backend/Dockerfile"
          
          provider: "openai"
          
          # 3. Changed 'openai-model' to 'model'
          model: "deepseek-ai/deepseek-v4-flash"
          
          policy-preset: "strict"
        env:
          OPENAI_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
